<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>熵减</title>
  </head>
  <body>
    <!-- 启动缓冲带：纯 CSS，零 JS 依赖，React 挂载后接管并淡出 -->
    <div id="app-splash" style="position:fixed;inset:0;z-index:99999;pointer-events:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;background:var(--kb-bg-primary,#FAF8F5);transition:opacity 0.5s ease">
      <div style="width:14px;height:14px;border-radius:50%;background:var(--kb-brand-500,#3B82F6);animation:kb-splash-breathe 2s ease-in-out infinite"></div>
      <span style="font-size:15px;font-weight:600;letter-spacing:0.12em;color:var(--kb-brand-500,#3B82F6);font-family:system-ui,sans-serif">熵减</span>
    </div>
    <style>@keyframes kb-splash-breathe{0%,100%{opacity:.35;transform:scale(.85)}50%{opacity:1;transform:scale(1.15)}}@media(prefers-color-scheme:dark){#app-splash{background:var(--kb-bg-primary,#0C1524)}}</style>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
