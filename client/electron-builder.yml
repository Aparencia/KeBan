# Electron Builder 打包配置 - 熵减桌面端
appId: com.entropydecrease.app
productName: "Entropy decrease"
publish:
  provider: github
  owner: YourGitHubUsername
  repo: KeBan
directories:
  output: release
  buildResources: build
asarUnpack:
  - "**/*.node"
files:
  - dist/**/*
  - dist-electron/**/*
  - app-icon.png
# 图标说明：
#   app-icon.png 为统一源文件（1024x1024 方形 PNG）。
#   electron-builder 会自动将其转换为各平台所需格式：
#     - Windows: .ico（含多分辨率）
#     - macOS: .icns
#     - Linux: 多分辨率 PNG
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: app-icon.png
mac:
  icon: app-icon.png
linux:
  icon: app-icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  # installerIcon/uninstallerIcon/installerHeaderIcon 省略
  # electron-builder 会自动从 win.icon 派生 NSIS 所需的 .ico 文件
  createDesktopShortcut: true
  shortcutName: "Entropy decrease"
  perMachine: false
  language: "2052"
