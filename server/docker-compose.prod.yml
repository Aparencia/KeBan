# =============================================================================
# 课伴（KeBan）生产环境 Docker Compose 编排
# 使用方式：docker compose -f docker-compose.prod.yml --env-file .env.production up -d
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 —— 主数据库
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: keban-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-keban}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-keban}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-keban}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - keban-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Redis 7 —— 缓存层
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: keban-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-keban_redis_prod}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-keban_redis_prod}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - keban-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # sync-service —— Go + Gin 同步服务（端口 8080）
  # ---------------------------------------------------------------------------
  sync-service:
    build:
      context: ./sync-service
    container_name: keban-sync-service
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      APP_ENV: production
      GIN_MODE: release
      DATABASE_URL: postgres://${DB_USER:-keban}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-keban}
      REDIS_URL: redis://:${REDIS_PASSWORD:-keban_redis_prod}@redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - keban-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # ai-gateway —— Python + FastAPI AI 网关（端口 8000）
  # ---------------------------------------------------------------------------
  ai-gateway:
    build:
      context: ./ai-gateway
    container_name: keban-ai-gateway
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_ENV: production
      QWEN_API_KEY: ${QWEN_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      GLM_API_KEY: ${GLM_API_KEY:-}
      REDIS_URL: redis://:${REDIS_PASSWORD:-keban_redis_prod}@redis:6379/1
      SYNC_SERVICE_URL: http://sync-service:8080
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - keban-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# =============================================================================
# 命名卷
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# =============================================================================
# 自定义网络
# =============================================================================
networks:
  keban-network:
    driver: bridge
