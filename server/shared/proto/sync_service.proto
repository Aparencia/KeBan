syntax = "proto3";

package keban.sync.v1;

option go_package = "github.com/keban/shared/proto/sync";

import "common.proto";

service SyncService {
  rpc Push(PushRequest) returns (PushResponse);
  rpc Pull(PullRequest) returns (PullResponse);
  rpc Resolve(ResolveRequest) returns (ResolveResponse);
  rpc Status(StatusRequest) returns (StatusResponse);
}

message Operation {
  string id = 1;
  string entity_type = 2;
  string entity_id = 3;
  string operation = 4;
  int32 version = 5;
  string patch = 6;
  string payload = 7;
  string device_id = 8;
  string created_at = 9;
}

message PushRequest {
  string device_id = 1;
  repeated Operation operations = 2;
}

message Conflict {
  string entity_type = 1;
  string entity_id = 2;
  int32 server_version = 3;
  string server_data = 4;
}

message PushResponse {
  repeated string accepted = 1;
  repeated Conflict conflicts = 2;
  repeated string errors = 3;
}

message PullRequest {
  string device_id = 1;
  int32 since_version = 2;
  int32 limit = 3;
}

message PullResponse {
  repeated Operation operations = 1;
  int32 latest_version = 2;
}

message ResolveRequest {
  string entity_type = 1;
  string entity_id = 2;
  string resolution = 3;
  string resolved_data = 4;
}

message ResolveResponse {
  bool success = 1;
  string message = 2;
}

message StatusRequest {
  string device_id = 1;
}

message StatusResponse {
  int32 total_operations = 1;
  int32 tracked_entities = 2;
  int32 latest_version = 3;
  bool healthy = 4;
}
