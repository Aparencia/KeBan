syntax = "proto3";

package keban.ai.v1;

option go_package = "github.com/keban/shared/proto/ai";

service AIService {
  rpc Summarize(SummarizeRequest) returns (SummarizeResponse);
  rpc GenerateCards(GenerateCardsRequest) returns (GenerateCardsResponse);
  rpc Evaluate(EvaluateRequest) returns (EvaluateResponse);
  rpc RecommendDuration(RecommendDurationRequest) returns (RecommendDurationResponse);
}

message SummarizeRequest {
  string content = 1;
  int32 max_length = 2;
  string language = 3;
}

message SummarizeResponse {
  string summary = 1;
  repeated string key_points = 2;
  string generated_at = 3;
}

message Flashcard {
  string front = 1;
  string back = 2;
  string hint = 3;
}

message GenerateCardsRequest {
  string content = 1;
  int32 count = 2;
  string difficulty = 3;
}

message GenerateCardsResponse {
  repeated Flashcard cards = 1;
  string generated_at = 2;
}

message EvaluateRequest {
  string concept = 1;
  string explanation = 2;
  repeated string criteria = 3;
}

message EvaluateDimension {
  string name = 1;
  int32 score = 2;
  string feedback = 3;
}

message EvaluateResponse {
  int32 overall_score = 1;
  repeated EvaluateDimension dimensions = 2;
  repeated string suggestions = 3;
  repeated string strengths = 4;
  repeated string weaknesses = 5;
  string generated_at = 6;
}

message SessionData {
  int32 duration = 1;
  bool completed = 2;
  string date = 3;
  string subject = 4;
}

message RecommendDurationRequest {
  repeated SessionData sessions = 1;
  double average_focus_time = 2;
  int32 preferred_duration = 3;
  int32 min_duration = 4;
  int32 max_duration = 5;
}

message RecommendDurationResponse {
  int32 recommended_duration = 1;
  string reasoning = 2;
  string confidence = 3;
  bool is_local_fallback = 4;
}
