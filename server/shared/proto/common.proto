syntax = "proto3";

package keban.common.v1;

option go_package = "github.com/keban/shared/proto/common";

message PaginationRequest {
  int32 page = 1;
  int32 page_size = 2;
}

message PaginationResponse {
  int32 total = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message Timestamp {
  int64 seconds = 1;
  int32 nanos = 2;
}

message Error {
  int32 code = 1;
  string message = 2;
  string details = 3;
}
