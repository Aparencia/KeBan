worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 2m;

    # 访问日志 & 错误日志
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;
    
    # Gzip 压缩
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1000;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=ai:10m rate=30r/m;

    # Upstream 后端服务
    upstream ai_gateway {
        server ai-gateway:8000;
    }
    upstream sync_service {
        server sync-service:8080;
    }

    # HTTP → HTTPS 重定向
    server {
        listen 80;
        server_name entropydecrease.com www.entropydecrease.com 121.40.24.242;
        return 301 https://$host$request_uri;
    }

    # HTTPS 主服务
    server {
        listen 443 ssl;
        server_name entropydecrease.com www.entropydecrease.com;

        # SSL 证书（由 Certbot / Let's Encrypt 签发）
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # 安全头
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # AI 网关健康检查（转发到 ai-gateway，不可用时降级为 Nginx 自检）
        location /health {
            access_log off;

            # 转发到 ai-gateway 后端（获取真实健康状态）
            proxy_pass http://ai_gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_connect_timeout 3s;
            proxy_read_timeout 5s;
            proxy_buffering off;
            proxy_request_buffering off;

            # ai-gateway 不可用时降级：返回 degraded 状态
            error_page 502 503 504 = @health_fallback;
        }

        # 健康检查降级 fallback（ai-gateway 不可达时由 Nginx 直接响应）
        # 命名 location 不继承 server 级 add_header，且不经过 FastAPI CORSMiddleware，必须自带 CORS 头
        location @health_fallback {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
            return 200 '{"status":"degraded","service":"ai-gateway","version":"unknown","error":"gateway unreachable"}';
        }

        # AI Gateway
        location /api/v1/ai/ {
            limit_req zone=ai burst=5 nodelay;
            proxy_pass http://ai_gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_read_timeout 120s;
        }

        # Sync Service
        location /api/v1/sync/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://sync_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket support for sync
        location /ws/ {
            proxy_pass http://sync_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
    }
}
